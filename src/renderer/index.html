<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>桌面 TODO</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <svg class="icon-sprite" aria-hidden="true" focusable="false">
      <symbol id="icon-lock" viewBox="0 0 24 24">
        <rect x="5" y="10" width="14" height="10" rx="2"></rect>
        <path d="M8 10V7a4 4 0 0 1 8 0v3"></path>
      </symbol>
      <symbol id="icon-unlock" viewBox="0 0 24 24">
        <rect x="5" y="10" width="14" height="10" rx="2"></rect>
        <path d="M16 10V7a4 4 0 0 0-7.6-1.7"></path>
      </symbol>
      <symbol id="icon-pin" viewBox="0 0 24 24">
        <path d="M9 4h6l-1 6 4 4v2h-5v5h-2v-5H6v-2l4-4-1-6z"></path>
      </symbol>
      <symbol id="icon-tray" viewBox="0 0 24 24">
        <path d="M5 5h14v9H5z"></path>
        <path d="M8 18h8"></path>
        <path d="M12 14v4"></path>
      </symbol>
      <symbol id="icon-close" viewBox="0 0 24 24">
        <path d="M7 7l10 10"></path>
        <path d="M17 7L7 17"></path>
      </symbol>
      <symbol id="icon-plus" viewBox="0 0 24 24">
        <path d="M12 5v14"></path>
        <path d="M5 12h14"></path>
      </symbol>
      <symbol id="icon-trash" viewBox="0 0 24 24">
        <path d="M5 7h14"></path>
        <path d="M10 11v5"></path>
        <path d="M14 11v5"></path>
        <path d="M8 7l1 12h6l1-12"></path>
        <path d="M9 7V5h6v2"></path>
      </symbol>
    </svg>

    <main class="shell" id="shell">
      <header class="topbar" id="topbar">
        <div class="brand">
          <span class="status-dot"></span>
          <span class="brand-mark">TODO</span>
          <span class="brand-title">今日清单</span>
          <span class="todo-count" id="todoCount">0 项</span>
        </div>
        <div class="window-actions no-drag">
          <button class="icon-button lock-toggle" id="lockButton" type="button" title="锁定位置" aria-label="锁定位置">
            <svg class="icon icon-lock"><use href="#icon-lock"></use></svg>
            <svg class="icon icon-unlock"><use href="#icon-unlock"></use></svg>
          </button>
          <button class="icon-button" id="pinButton" type="button" title="取消置顶" aria-label="置顶开关">
            <svg class="icon"><use href="#icon-pin"></use></svg>
          </button>
          <button class="icon-button" id="hideButton" type="button" title="隐藏到托盘" aria-label="隐藏到托盘">
            <svg class="icon"><use href="#icon-tray"></use></svg>
          </button>
          <button class="icon-button danger" id="quitButton" type="button" title="退出" aria-label="退出">
            <svg class="icon"><use href="#icon-close"></use></svg>
          </button>
        </div>
      </header>

      <form class="composer no-drag" id="newTodoForm">
        <input id="newTodoInput" type="text" autocomplete="off" maxlength="120" placeholder="写下今天要做的事" />
        <button class="add-button" type="submit" title="添加" aria-label="添加">
          <svg class="icon"><use href="#icon-plus"></use></svg>
        </button>
      </form>

      <section class="list-wrap no-drag" aria-live="polite">
        <ul class="todo-list" id="todoList"></ul>
        <div class="empty-state" id="emptyState">今天很轻，留白也很好。</div>
      </section>

      <footer class="footer no-drag">
        <span id="completedCount">0 已完成</span>
        <span class="save-state" id="saveState">已保存</span>
      </footer>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
